<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Love Language - DJBC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .djbc-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div id="app" class="bg-white p-8 rounded-3xl shadow-2xl max-w-lg w-full border border-slate-200">
        <div class="flex items-center justify-center gap-2 mb-6">
            <div class="bg-slate-800 text-white px-3 py-1 rounded-lg font-black text-sm tracking-tighter">DJBC</div>
            <div class="h-4 w-px bg-slate-300"></div>
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Pengembangan SDM</span>
        </div>

        <div id="start-screen" class="text-center">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Tes Love Language</h1>
            <p class="text-slate-500 mb-8 text-sm leading-relaxed">Pahami preferensi komunikasi emosional Anda untuk membangun hubungan interpersonal yang lebih harmonis di lingkungan kerja maupun pribadi.</p>
            
            <div class="text-left mb-6">
                <label class="block text-xs font-bold uppercase text-slate-400 mb-2 ml-1">Nama Lengkap</label>
                <input id="nameInput" type="text" placeholder="Masukkan nama Anda..." 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            </div>
            
            <button onclick="startTest()" class="w-full djbc-gradient text-white py-4 rounded-2xl font-bold shadow-lg hover:opacity-90 transition-all active:scale-95">
                Mulai Tes 30 Soal
            </button>
        </div>
        <div id="test-content" class="hidden"></div>
    </div>

    <script>
        const questions = [
            { id: 1, optionA: { text: "Saya menerima catatan/sms/email kata-kata manis.", cat: "words" }, optionB: { text: "Saya berpelukan dengan pasangan saya.", cat: "touch" } },
            { id: 2, optionA: { text: "Saya bisa menghabiskan waktu sendiri hanya berdua.", cat: "time" }, optionB: { text: "Pasangan saya melakukan sesuatu yang praktis untuk membantu saya.", cat: "acts" } },
            { id: 3, optionA: { text: "Pasangan saya memberi bingkisan kecil sebagai tanda kasih.", cat: "gifts" }, optionB: { text: "Saya mengambil waktu nyaman tanpa gangguan.", cat: "time" } },
            { id: 4, optionA: { text: "Pasangan saya melakukan sesuatu yang tak disangka (seperti isi bensin/cuci baju).", cat: "acts" }, optionB: { text: "Saya saling bersentuhan dengan pasangan saya.", cat: "touch" } },
            { id: 5, optionA: { text: "Pasangan saya menaruh lengannya di bahu saya di tempat umum.", cat: "touch" }, optionB: { text: "Pasangan saya memberi kejutan berupa bingkisan kecil.", cat: "gifts" } },
            { id: 6, optionA: { text: "Saya bersama pasangan saya meskipun tidak melakukan apapun.", cat: "time" }, optionB: { text: "Saya bergandengan tangan dengan pasangan saya.", cat: "touch" } },
            { id: 7, optionA: { text: "Pasangan saya memberi saya bingkisan.", cat: "gifts" }, optionB: { text: "Saya mendengar kata 'I love you' dari pasangan saya.", cat: "words" } },
            { id: 8, optionA: { text: "Saya duduk dekat dengan pasangan saya.", cat: "touch" }, optionB: { text: "Saya dipuji oleh pasangan saya tanpa alasan semu.", cat: "words" } },
            { id: 9, optionA: { text: "Saya mendapat kesempatan bercengkerama dengan pasangan saya.", cat: "time" }, optionB: { text: "Saya mendapat hadiah tidak terduga dari pasangan saya.", cat: "gifts" } },
            { id: 10, optionA: { text: "Mendengar pasangan berkata, 'Saya bangga kepadamu.'", cat: "words" }, optionB: { text: "Pasangan saya membantu mengerjakan tugas-tugas saya.", cat: "acts" } },
            { id: 11, optionA: { text: "Saya mengerjakan sesuatu bersama-sama dengan pasangan.", cat: "time" }, optionB: { text: "Saya mendengar kata-kata dorongan dari pasangan saya.", cat: "words" } },
            { id: 12, optionA: { text: "Pasangan melakukan sesuatu yang baik, bukan hanya bicara.", cat: "acts" }, optionB: { text: "Saya merasa terhubung melalui pelukan.", cat: "touch" } },
            { id: 13, optionA: { text: "Saya mendengar pujian dari pasangan saya.", cat: "words" }, optionB: { text: "Pasangan memberi sesuatu sebagai tanda perhatian.", cat: "gifts" } },
            { id: 14, optionA: { text: "Saya bisa terus bersama-sama dengan pasangan saya.", cat: "time" }, optionB: { text: "Punggung saya dipijat oleh pasangan saya.", cat: "touch" } },
            { id: 15, optionA: { text: "Pasangan saya memuji pencapaian saya.", cat: "words" }, optionB: { text: "Pasangan melakukan hal yang kurang ia nikmati demi saya.", cat: "acts" } },
            { id: 16, optionA: { text: "Pasangan saya dan saya sering berciuman.", cat: "touch" }, optionB: { text: "Pasangan menunjukkan ketertarikan pada hobi saya.", cat: "time" } },
            { id: 17, optionA: { text: "Pasangan mengerjakan proyek khusus yang harus saya selesaikan.", cat: "acts" }, optionB: { text: "Pasangan saya memberikan hadiah yang menarik.", cat: "gifts" } },
            { id: 18, optionA: { text: "Saya dipuji pasangan karena penampilan saya.", cat: "words" }, optionB: { text: "Pasangan mendengarkan dan memahami perasaan saya.", cat: "time" } },
            { id: 19, optionA: { text: "Menunjukkan sentuhan non-seksual di muka umum.", cat: "touch" }, optionB: { text: "Pasangan menawarkan mengerjakan urusan-urusan saya.", cat: "acts" } },
            { id: 20, optionA: { text: "Pasangan mengerjakan lebih banyak tugas dari pembagian biasanya.", cat: "acts" }, optionB: { text: "Mendapat hadiah yang dipilih pasangan dengan sungguh-sungguh.", cat: "gifts" } },
            { id: 21, optionA: { text: "Pasangan tidak membuka HP saat kami berbincang.", cat: "time" }, optionB: { text: "Pasangan mengajak keluar untuk meringankan stres saya.", cat: "acts" } },
            { id: 22, optionA: { text: "Saya mengharapkan liburan karena hadiah yang diberikan.", cat: "gifts" }, optionB: { text: "Mendengar kata 'saya menghargaimu' dari pasangan.", cat: "words" } },
            { id: 23, optionA: { text: "Pasangan membawakan oleh-oleh saat pulang bepergian.", cat: "gifts" }, optionB: { text: "Pasangan mengerjakan tugas saya karena saya lelah.", cat: "acts" } },
            { id: 24, optionA: { text: "Pasangan tidak menyela ketika saya berbicara.", cat: "time" }, optionB: { text: "Pemberian hadiah menjadi bagian penting hubungan kami.", cat: "gifts" } },
            { id: 25, optionA: { text: "Pasangan membantu ketika tahu saya sudah kelelahan.", cat: "acts" }, optionB: { text: "Pergi ke suatu tempat untuk menghabiskan waktu bersama.", cat: "time" } },
            { id: 26, optionA: { text: "Pasangan dan saya memiliki keintiman secara fisik.", cat: "touch" }, optionB: { text: "Pasangan memberi kado kecil yang ia beli saat beraktifitas.", cat: "gifts" } },
            { id: 27, optionA: { text: "Pasangan mengatakan sesuatu yang mendorong semangat saya.", cat: "words" }, optionB: { text: "Menghabiskan waktu melakukan hobi bersama pasangan.", cat: "time" } },
            { id: 28, optionA: { text: "Pasangan memberi hadiah kejutan sebagai penghargaan.", cat: "gifts" }, optionB: { text: "Sering bersentuhan saat melakukan aktifitas sehari-hari.", cat: "touch" } },
            { id: 29, optionA: { text: "Pasangan membantu saya meskipun ia sedang sibuk.", cat: "acts" }, optionB: { text: "Mendengar pasangan berkata, 'Aku menghargaimu.'", cat: "words" } },
            { id: 30, optionA: { text: "Berpelukan setelah pasangan pulang dari bepergian lama.", cat: "touch" }, optionB: { text: "Mendengar pasangan berkata betapa berharganya saya.", cat: "words" } }
        ];

        let currentStep = 0;
        let answers = [];
        let userName = "";

        const library = {
            words: { title: "Words of Affirmation", emoji: "💬", desc: "Anda merasa sangat dicintai melalui pujian, apresiasi, dan kata-kata yang memotivasi. Kalimat verbal adalah kunci energi Anda." },
            time: { title: "Quality Time", emoji: "⏳", desc: "Kehadiran penuh dan waktu tanpa distraksi adalah hal terpenting. Anda menghargai percakapan mendalam dan aktivitas bersama." },
            gifts: { title: "Receiving Gifts", emoji: "🎁", desc: "Bagi Anda, hadiah adalah simbol visual dari kasih sayang. Ini bukan soal harga, tapi tentang pemikiran dan usaha di baliknya." },
            acts: { title: "Acts of Service", emoji: "🛠️", desc: "Tindakan nyata lebih bermakna dari sekadar kata-kata. Anda merasa dihargai saat seseorang membantu meringankan beban tugas Anda." },
            touch: { title: "Physical Touch", emoji: "🤝", desc: "Sentuhan fisik non-seksual memberikan rasa aman dan koneksi emosional bagi Anda." }
        };

        function startTest() {
            userName = document.getElementById('nameInput').value;
            if(!userName) return alert("Silakan isi nama Anda.");
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('test-content').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentStep];
            const progress = ((currentStep + 1) / questions.length) * 100;
            const content = document.getElementById('test-content');
            content.innerHTML = `
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2 font-bold text-[10px] uppercase tracking-tighter text-slate-400">
                        <span>Progress Analisis</span>
                        <span>${currentStep + 1} / 30</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full"><div class="bg-slate-800 h-full rounded-full transition-all" style="width: ${progress}%"></div></div>
                </div>
                <h2 class="text-lg font-bold mb-6 text-slate-800 italic">"Lebih berkesan bagi saya ketika..."</h2>
                <div class="space-y-3">
                    <button onclick="handleAnswer('${q.optionA.cat}')" class="w-full text-left p-4 border border-slate-200 hover:border-slate-800 rounded-2xl transition-all bg-white text-sm font-medium text-slate-700 shadow-sm">${q.optionA.text}</button>
                    <button onclick="handleAnswer('${q.optionB.cat}')" class="w-full text-left p-4 border border-slate-200 hover:border-slate-800 rounded-2xl transition-all bg-white text-sm font-medium text-slate-700 shadow-sm">${q.optionB.text}</button>
                </div>
            `;
        }

        async function handleAnswer(cat) {
            answers.push(cat);
            if(currentStep < questions.length - 1) {
                currentStep++;
                showQuestion();
            } else {
                finishTest();
            }
        }

        async function finishTest() {
            document.getElementById('test-content').innerHTML = "<div class='py-12 text-center'><p class='font-bold text-slate-500'>Menganalisis hasil...</p></div>";
            
            const counts = { words:0, time:0, gifts:0, acts:0, touch:0 };
            answers.forEach(c => counts[c]++);
            const sorted = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
            const r1 = sorted[0], r2 = sorted[1], r3 = sorted[2];

            const scriptURL = 'https://script.google.com/macros/s/AKfycbzrnGyE6oQUwtnhvDj1hBuGKFo-76B73vNZHw44G1HUWAQ5OMEe1l1v_cPVXRc8n3iKmg/exec';
            try { 
                await fetch(scriptURL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ nama: userName, ...counts, result: r1.toUpperCase() }) 
                }); 
            } catch (e) { console.log(e); }

            document.getElementById('test-content').innerHTML = `
                <div>
                    <h2 class="text-2xl font-black text-slate-900 mb-2 text-center">Profil Bahasa Cinta</h2>
                    <p class="text-center text-slate-800 text-sm mb-8 uppercase tracking-widest font-black">${userName}</p>
                    
                    <div class="djbc-gradient text-white p-6 rounded-3xl shadow-xl mb-6 text-center">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold uppercase tracking-widest opacity-70">Bahasa Utama (Rank 1)</span>
                            <span class="text-2xl">${library[r1].emoji}</span>
                        </div>
                        <h3 class="text-2xl font-black mb-2">${library[r1].title.toUpperCase()}</h3>
                        <p class="text-sm leading-relaxed opacity-90 font-medium">${library[r1].desc}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Rank 2</p>
                            <p class="text-xs font-bold text-slate-700">${library[r2].emoji} ${library[r2].title}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Rank 3</p>
                            <p class="text-xs font-bold text-slate-700">${library[r3].emoji} ${library[r3].title}</p>
                        </div>
                    </div>

                    <div class="text-center">
                        <button onclick="location.reload()" class="text-slate-400 font-bold text-[10px] uppercase hover:text-slate-800 transition-all tracking-widest underline">Ulangi Analisis</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
